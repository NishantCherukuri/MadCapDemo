    <body>
        <h1 class="topictitle">Network Logs Scan</h1>
        <p>The Network Logs Scan page lets you view the scan status, and a list of current network
            logs scans in a tabular format. </p>
        <p>The secondary navigation bar contains  the following two options:</p>
        <div class="section" id="section_l2p_d4m_bgc">
            <h2 class="sectiontitle">Reload</h2>
            <p>Reloads the network logs scan table.</p>
        </div>
        <div class="section" id="section_xlp_24m_bgc">
            <h2 class="sectiontitle">Start scan now</h2>
            <p>Start a new network scan.</p>
        </div>
